<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote CLI</title>
    <style>
        :root {
            --bg: #0d1117;
            --bg-secondary: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --green: #3fb950;
            --red: #f85149;
            --prompt-bg: #1c2128;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header h1 {
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: var(--red);
            display: inline-block;
        }
        .status-dot.connected { background: var(--green); }
        .header-actions { display: flex; gap: 8px; align-items: center; }

        /* Chat area */
        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            padding: 12px 16px;
            border-radius: 8px;
            max-width: 85%;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; } }
        .message.prompt {
            background: var(--prompt-bg);
            border-left: 3px solid var(--accent);
            align-self: flex-end;
        }
        .message.response {
            background: var(--bg-secondary);
            border-left: 3px solid var(--green);
            align-self: flex-start;
        }
        .message-header {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }
        .message-body {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', monospace;
            font-size: 14px;
            line-height: 1.6;
        }

        /* Input area */
        .input-area {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            padding: 14px 20px;
        }
        .input-form { display: flex; gap: 10px; }
        .input-form textarea {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 14px;
            border-radius: 6px;
            font-family: 'SFMono-Regular', Consolas, monospace;
            font-size: 14px;
            resize: none;
            outline: none;
            min-height: 44px;
            max-height: 160px;
        }
        .input-form textarea:focus { border-color: var(--accent); }
        .input-form button {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            white-space: nowrap;
        }
        .input-form button:hover { opacity: 0.9; }
        .input-form button:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Setup screen */
        .setup {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; padding: 20px;
        }
        .setup-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 32px;
            max-width: 460px; width: 100%;
        }
        .setup-card h2 { margin-bottom: 6px; }
        .setup-card p { color: var(--text-muted); margin-bottom: 20px; font-size: 14px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; }
        .form-group input, .form-group select {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }
        .form-group input:focus { border-color: var(--accent); }
        .btn-primary {
            background: var(--accent); color: #fff; border: none;
            padding: 10px 20px; border-radius: 6px; cursor: pointer;
            font-weight: 600; width: 100%; font-size: 14px;
        }
        .btn-primary:hover { opacity: 0.9; }

        /* Buttons */
        select.hdr-select {
            background: var(--bg); border: 1px solid var(--border);
            color: var(--text); padding: 6px 10px; border-radius: 6px;
            font-size: 13px; outline: none; max-width: 240px;
        }
        .btn-sm {
            background: var(--bg); border: 1px solid var(--border);
            color: var(--text); padding: 6px 12px; border-radius: 6px;
            cursor: pointer; font-size: 13px;
        }
        .btn-sm:hover { border-color: var(--accent); }

        /* Modal */
        .modal-overlay {
            display: none; position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 100; align-items: center; justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--bg-secondary); border: 1px solid var(--border);
            border-radius: 12px; padding: 24px;
            max-width: 420px; width: 90%;
        }
        .modal h3 { margin-bottom: 16px; }

        /* Empty state */
        .empty-state {
            text-align: center; color: var(--text-muted);
            padding: 60px 20px; margin: auto;
        }
        .empty-state h3 { margin-bottom: 8px; color: var(--text); }

        /* Responsive */
        @media (max-width: 600px) {
            .message { max-width: 95%; }
            .header h1 { font-size: 15px; }
            .header-actions { gap: 4px; }
        }
    </style>
</head>
<body>

<!-- ─── Setup Screen ─── -->
<div id="setupScreen" class="setup">
    <div class="setup-card">
        <h2>🖥️ Remote CLI</h2>
        <p>Connect to your local Copilot CLI through GitHub Issues.</p>
        <div class="form-group">
            <label for="setupToken">GitHub Personal Access Token</label>
            <input type="password" id="setupToken" placeholder="ghp_xxxxxxxxxxxx">
        </div>
        <div class="form-group">
            <label for="setupRepo">Repository (owner/repo)</label>
            <input type="text" id="setupRepo" placeholder="yamatsushita/remote_cli" value="yamatsushita/remote_cli">
        </div>
        <button class="btn-primary" onclick="saveSetup()">Connect</button>
    </div>
</div>

<!-- ─── Chat Screen ─── -->
<div id="chatScreen" style="display:none; height:100vh; flex-direction:column;">
    <div class="header">
        <h1>
            <span class="status-dot" id="statusDot"></span>
            Remote CLI
            <span id="statusText" style="font-size:13px; color:var(--text-muted); font-weight:400;">Disconnected</span>
        </h1>
        <div class="header-actions">
            <select class="hdr-select" id="sessionSelect" onchange="switchSession()">
                <option value="">Select session…</option>
            </select>
            <button class="btn-sm" onclick="refreshSessions()" title="Refresh sessions">↻</button>
            <button class="btn-sm" onclick="showSettings()" title="Settings">⚙️</button>
        </div>
    </div>

    <div class="chat" id="chatArea">
        <div class="empty-state" id="emptyState">
            <h3>No messages yet</h3>
            <p>Start the Python client to create a session, or type a prompt below.</p>
        </div>
    </div>

    <div class="input-area">
        <form class="input-form" onsubmit="sendPrompt(event)">
            <textarea id="promptInput" placeholder="Type a prompt… (Enter to send, Shift+Enter for newline)" rows="1"
                onkeydown="handleKey(event)"
                oninput="autoResize(this)"></textarea>
            <button type="submit" id="sendBtn">Send</button>
        </form>
    </div>
</div>

<!-- ─── Settings Modal ─── -->
<div class="modal-overlay" id="settingsModal">
    <div class="modal">
        <h3>⚙️ Settings</h3>
        <div class="form-group">
            <label for="settingsToken">GitHub Token</label>
            <input type="password" id="settingsToken">
        </div>
        <div class="form-group">
            <label for="settingsRepo">Repository (owner/repo)</label>
            <input type="text" id="settingsRepo">
        </div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button class="btn-primary" onclick="updateSettings()" style="flex:1;">Save</button>
            <button class="btn-sm" onclick="closeSettings()" style="flex:1; text-align:center;">Cancel</button>
        </div>
    </div>
</div>

<script>
// ─── State ───
let config = { token: '', repo: '', owner: '' };
let currentIssue = null;
let knownCommentIds = new Set();
let pollTimer = null;
let messages = [];

// ─── Init ───
(function init() {
    const saved = localStorage.getItem('remoteCli');
    if (saved) {
        try {
            config = JSON.parse(saved);
            if (config.token && config.repo && config.owner) { showChat(); return; }
        } catch (_) {}
    }
    document.getElementById('setupScreen').style.display = 'flex';
})();

function saveSetup() {
    const token = document.getElementById('setupToken').value.trim();
    const repoFull = document.getElementById('setupRepo').value.trim();
    if (!token || !repoFull) return alert('Please fill in all fields.');
    const parts = repoFull.split('/');
    if (parts.length !== 2) return alert('Repository format must be owner/repo');
    config = { token, owner: parts[0], repo: parts[1] };
    localStorage.setItem('remoteCli', JSON.stringify(config));
    showChat();
}

function showChat() {
    document.getElementById('setupScreen').style.display = 'none';
    const el = document.getElementById('chatScreen');
    el.style.display = 'flex'; el.style.flexDirection = 'column';
    refreshSessions();
}

// ─── GitHub API ───
async function ghAPI(path, opts = {}) {
    const url = `https://api.github.com/repos/${config.owner}/${config.repo}${path}`;
    const res = await fetch(url, {
        ...opts,
        headers: {
            'Authorization': `token ${config.token}`,
            'Accept': 'application/vnd.github.v3+json',
            'Content-Type': 'application/json',
            ...(opts.headers || {})
        }
    });
    if (!res.ok) {
        const body = await res.text();
        throw new Error(`GitHub API ${res.status}: ${body.slice(0, 200)}`);
    }
    return res.status === 204 ? null : res.json();
}

// ─── Sessions ───
async function refreshSessions() {
    try {
        const issues = await ghAPI('/issues?labels=remote-cli&state=open&sort=created&direction=desc&per_page=20');
        const sel = document.getElementById('sessionSelect');
        sel.innerHTML = '<option value="">Select session…</option>';
        for (const issue of issues) {
            const opt = document.createElement('option');
            opt.value = issue.number;
            opt.textContent = `#${issue.number}: ${issue.title}`;
            sel.appendChild(opt);
        }
        if (issues.length > 0 && !currentIssue) {
            sel.value = issues[0].number;
            switchSession();
        } else if (currentIssue) {
            sel.value = currentIssue;
        }
    } catch (e) {
        console.error('Failed to fetch sessions:', e);
        alert('Could not connect. Check your token and repo settings.');
    }
}

async function switchSession() {
    const sel = document.getElementById('sessionSelect');
    currentIssue = sel.value ? parseInt(sel.value) : null;
    messages = [];
    knownCommentIds.clear();
    renderMessages();
    stopPolling();
    if (currentIssue) {
        await loadAllComments();
        startPolling();
    }
}

// ─── Comments ───
async function loadAllComments() {
    if (!currentIssue) return;
    try {
        const comments = await ghAPI(`/issues/${currentIssue}/comments?per_page=100`);
        messages = [];
        for (const c of comments) {
            knownCommentIds.add(c.id);
            const msg = parseComment(c);
            if (msg) messages.push(msg);
        }
        renderMessages();
        refreshStatus();
    } catch (e) {
        console.error('Load comments error:', e);
    }
}

function parseComment(comment) {
    const body = comment.body || '';
    if (body.startsWith('### 🧑 Prompt')) {
        return { id: comment.id, type: 'prompt', content: body.replace(/^### 🧑 Prompt\s*\n*/, ''), ts: comment.created_at, user: comment.user.login };
    }
    if (body.startsWith('### 🤖 Response')) {
        return { id: comment.id, type: 'response', content: body.replace(/^### 🤖 Response\s*\n*/, ''), ts: comment.created_at, user: comment.user.login };
    }
    if (body.startsWith('### 📡 Status')) {
        return { id: comment.id, type: 'status', content: body.replace(/^### 📡 Status\s*\n*/, ''), ts: comment.created_at, user: comment.user.login };
    }
    return null;
}

async function pollComments() {
    if (!currentIssue) return;
    try {
        const comments = await ghAPI(`/issues/${currentIssue}/comments?per_page=100`);
        let changed = false;
        for (const c of comments) {
            if (!knownCommentIds.has(c.id)) {
                knownCommentIds.add(c.id);
                const msg = parseComment(c);
                if (msg) { messages.push(msg); changed = true; }
            }
        }
        if (changed) { renderMessages(); refreshStatus(); }
    } catch (e) {
        console.error('Poll error:', e);
    }
}

function startPolling() { stopPolling(); pollTimer = setInterval(pollComments, 4000); }
function stopPolling() { if (pollTimer) { clearInterval(pollTimer); pollTimer = null; } }

// ─── Status ───
function refreshStatus() {
    const statusMsgs = messages.filter(m => m.type === 'status');
    const dot = document.getElementById('statusDot');
    const txt = document.getElementById('statusText');
    if (statusMsgs.length > 0) {
        const latest = statusMsgs[statusMsgs.length - 1];
        const ageS = (Date.now() - new Date(latest.ts).getTime()) / 1000;
        if (ageS < 180) {
            dot.classList.add('connected');
            txt.textContent = 'Client connected';
            return;
        }
    }
    dot.classList.remove('connected');
    txt.textContent = 'Client offline';
}

// ─── Send ───
async function sendPrompt(e) {
    e.preventDefault();
    const input = document.getElementById('promptInput');
    const text = input.value.trim();
    if (!text || !currentIssue) return;
    const btn = document.getElementById('sendBtn');
    btn.disabled = true; input.disabled = true;
    try {
        const body = `### 🧑 Prompt\n\n${text}`;
        const comment = await ghAPI(`/issues/${currentIssue}/comments`, {
            method: 'POST',
            body: JSON.stringify({ body })
        });
        knownCommentIds.add(comment.id);
        const msg = parseComment(comment);
        if (msg) messages.push(msg);
        renderMessages();
        input.value = '';
        autoResize(input);
    } catch (e) {
        alert('Failed to send prompt: ' + e.message);
    } finally {
        btn.disabled = false; input.disabled = false; input.focus();
    }
}

// ─── Render ───
function renderMessages() {
    const chat = document.getElementById('chatArea');
    const display = messages.filter(m => m.type !== 'status');
    if (display.length === 0) {
        chat.innerHTML = `<div class="empty-state"><h3>No messages yet</h3>
            <p>Start the Python client to create a session, or type a prompt below.</p></div>`;
        return;
    }
    chat.innerHTML = display.map(m => `
        <div class="message ${m.type}">
            <div class="message-header">
                ${m.type === 'prompt' ? '🧑 You' : '🤖 CLI'} · ${new Date(m.ts).toLocaleString()}
            </div>
            <div class="message-body">${escapeHtml(m.content)}</div>
        </div>`).join('');
    chat.scrollTop = chat.scrollHeight;
}

function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

// ─── Input helpers ───
function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendPrompt(e); }
}
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 160) + 'px'; }

// ─── Settings ───
function showSettings() {
    document.getElementById('settingsToken').value = config.token;
    document.getElementById('settingsRepo').value = `${config.owner}/${config.repo}`;
    document.getElementById('settingsModal').classList.add('active');
}
function closeSettings() { document.getElementById('settingsModal').classList.remove('active'); }
function updateSettings() {
    const token = document.getElementById('settingsToken').value.trim();
    const repoFull = document.getElementById('settingsRepo').value.trim();
    if (!token || !repoFull) return;
    const parts = repoFull.split('/');
    if (parts.length !== 2) return alert('Format: owner/repo');
    config = { token, owner: parts[0], repo: parts[1] };
    localStorage.setItem('remoteCli', JSON.stringify(config));
    closeSettings();
    stopPolling();
    currentIssue = null;
    refreshSessions();
}
</script>
</body>
</html>
